

services:
  # Service pour l'API Symfony
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      - DATABASE_URL=mysql://root:Mayabkr4@db/rutix_db

  # Service pour la base de données MySQL
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rutix_db
      MYSQL_USER: root
      MYSQL_PASSWORD: Mayabkr4
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
